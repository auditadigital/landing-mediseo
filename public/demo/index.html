  <style>
    html { scroll-behavior: smooth; }
    .fade-in { animation: fade .5s ease both; }
    @keyframes fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

    /* ===== Hero header (portado del componente React a CSS) ===== */
    /* Entrada escalonada de cada elemento (equivalente a los variants de framer-motion). */
    .hero2-item { opacity: 0; animation: hero2Up .55s ease-out forwards; }
    @keyframes hero2Up { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: none; } }
    /* Reveal de la imagen con clip-path (equivalente a la animación circOut del original). */
    .hero2-img { animation: hero2Clip 1.2s cubic-bezier(0, 0.55, 0.45, 1) forwards; }
    @keyframes hero2Clip {
      from { clip-path: polygon(100% 0, 100% 0, 100% 100%, 100% 100%); }
      to   { clip-path: polygon(25% 0, 100% 0, 100% 100%, 0% 100%); }
    }
    @media (prefers-reduced-motion: reduce) {
      .hero2-item, .hero2-img { animation: none; opacity: 1; clip-path: none; }
    }
  </style>

        <span class="font-bold text-slate-900 text-lg">MediSeoul</span>

      <div class="flex items-center gap-3">
        <a href="#contacto" data-i18n="nav.cta" class="hidden sm:inline-flex text-sm font-semibold text-brand-700 hover:text-brand-900"></a>

          <button id="lang-en" onclick="setLang('en')" class="px-3 py-1.5 transition">EN</button>

          <!-- Título / subtítulo / CTA -->
          <div>
            <h1 id="hero2-title" class="text-4xl font-bold leading-tight text-slate-900 md:text-5xl hero2-item" style="animation-delay:.3s"></h1>
            <div class="my-6 h-1 w-20 bg-brand-600 hero2-item" style="animation-delay:.45s"></div>
            <p data-i18n="hero2.subtitle" class="mb-8 max-w-md text-base text-slate-500 hero2-item" style="animation-delay:.6s"></p>

          </div>
        </div>
        <!-- Footer: datos de contacto (íconos estilo lucide inline) -->

            <div class="flex items-center">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-5 w-5 text-brand-600 mr-2 flex-shrink-0"><circle cx="12" cy="12" r="10"></circle><line x1="2" x2="22" y1="12" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
              <span data-i18n="hero2.web"></span>
            </div>
            <div class="flex items-center">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-5 w-5 text-brand-600 mr-2 flex-shrink-0"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>

            </div>
          </div>
        </footer>

           style="background-image:url('https://images.unsplash.com/photo-1576091160550-2173dba999ef?auto=format&fit=crop&w=900&q=80')"></div>

          <input name="contact" type="text" data-i18n-ph="form.contactPh" class="w-full rounded-xl border border-slate-200 px-4 py-2.5 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none" />

        </div>
        <button type="submit" data-i18n="form.submit" class="w-full rounded-xl bg-brand-600 text-white font-semibold py-3 shadow-lg shadow-brand-600/20 hover:bg-brand-700 transition"></button>

    // ===== state (in-memory, no localStorage) =====
    let currentLang = 'en';

    function get(obj, path) {
      return path.split('.').reduce((o, k) => (o ? o[k] : undefined), obj);
    }

    function render() {
      const t = I18N[currentLang];
      document.documentElement.lang = currentLang;

      // simple text bindings
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const val = get(t, el.getAttribute('data-i18n'));
        if (typeof val === 'string') el.textContent = val;
      });
      // placeholders
      document.querySelectorAll('[data-i18n-ph]').forEach(el => {
        const val = get(t, el.getAttribute('data-i18n-ph'));
        if (typeof val === 'string') el.setAttribute('placeholder', val);
      });
      // select options (treatment)
      document.querySelectorAll('[data-i18n-options]').forEach(el => {
        const opts = get(t, el.getAttribute('data-i18n-options'));
        if (Array.isArray(opts)) {
          el.innerHTML = opts.map(o => `<option>${o}</option>`).join('');
        }
      });

      // hero2 header: el título lleva <br> y un <span> de color, así que va como HTML.
      // Contenido propio y de confianza (definido en el objeto I18N de arriba).
      document.getElementById('hero2-title').innerHTML = t.hero2.title;

      // treatment cards
      document.getElementById('treat-grid').innerHTML = t.treat.items.map(i => `
        <div class="bg-white rounded-2xl border border-slate-100 p-6 hover:shadow-xl hover:shadow-slate-200/60 hover:-translate-y-1 transition">
          <div class="w-12 h-12 rounded-xl bg-brand-50 flex items-center justify-center text-2xl mb-4">${i.icon}</div>
          <h3 class="font-bold text-slate-900">${i.name}</h3>
          <p class="mt-1.5 text-sm text-slate-500">${i.desc}</p>
          <p class="mt-4 font-semibold text-mint-600">${i.price}</p>
        </div>`).join('');

      // why grid
      document.getElementById('why-grid').innerHTML = t.why.items.map(i => `
        <div class="bg-white rounded-2xl border border-slate-100 p-7">
          <div class="w-12 h-12 rounded-xl bg-mint-50 flex items-center justify-center text-2xl mb-4">${i.icon}</div>
          <h3 class="font-bold text-slate-900 text-lg">${i.title}</h3>
          <p class="mt-2 text-slate-600 text-sm">${i.desc}</p>
        </div>`).join('');

      // how grid
      document.getElementById('how-grid').innerHTML = t.how.items.map(i => `
        <div class="relative bg-gradient-to-b from-brand-50 to-white rounded-2xl border border-brand-100 p-7">
          <div class="w-10 h-10 rounded-full bg-brand-600 text-white font-bold flex items-center justify-center mb-4">${i.step}</div>
          <h3 class="font-bold text-slate-900 text-lg">${i.title}</h3>
          <p class="mt-2 text-slate-600 text-sm">${i.desc}</p>
        </div>`).join('');

      // testimonials
      document.getElementById('test-grid').innerHTML = t.test.items.map(i => `
        <div class="bg-white rounded-2xl border border-slate-100 p-6 shadow-sm">
          <div class="text-mint-500 text-lg">★★★★★</div>
          <p class="mt-3 text-slate-600 text-sm italic">“${i.text}”</p>
          <div class="mt-4 flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-gradient-to-br from-brand-200 to-mint-200"></div>
            <div>
              <p class="font-semibold text-slate-900 text-sm">${i.name}</p>
              <p class="text-xs text-slate-400">${i.country}</p>
            </div>
          </div>
        </div>`).join('');

      // active lang button
      document.getElementById('lang-en').className = 'px-3 py-1.5 transition ' + (currentLang === 'en' ? 'bg-brand-600 text-white' : 'text-slate-500 hover:bg-slate-50');
      document.getElementById('lang-es').className = 'px-3 py-1.5 transition ' + (currentLang === 'es' ? 'bg-brand-600 text-white' : 'text-slate-500 hover:bg-slate-50');
    }

    function setLang(lang) {
      currentLang = lang;
      // reset form messages on lang change
      document.getElementById('form-success').classList.add('hidden');
      render();
    }

    function toggleChat() {
      document.getElementById('chat-panel').classList.toggle('hidden');
    }

    // ===== form validation =====
    document.getElementById('lead-form').addEventListener('submit', function (e) {
      e.preventDefault();
      const t = I18N[currentLang];
      const f = e.target;
      let ok = true;

      const nameVal = f.name.value.trim();
      const nameErr = document.querySelector('[data-err="name"]');
      if (!nameVal) {
        nameErr.textContent = t.form.errName; nameErr.classList.remove('hidden'); ok = false;
      } else { nameErr.classList.add('hidden'); }

      const contactVal = f.contact.value.trim();
      const contactErr = document.querySelector('[data-err="contact"]');
      const emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      const phoneRe = /[\d+][\d\s()-]{6,}/;
      if (!contactVal || !(emailRe.test(contactVal) || phoneRe.test(contactVal))) {
        contactErr.textContent = t.form.errContact; contactErr.classList.remove('hidden'); ok = false;
      } else { contactErr.classList.add('hidden'); }

      const success = document.getElementById('form-success');
      if (ok) {
        success.textContent = t.form.success;
        success.classList.remove('hidden');
        f.reset();
        success.scrollIntoView({ behavior: 'smooth', block: 'center' });
      } else {
        success.classList.add('hidden');
      }
    });

    // initial paint
    render();
  </script>
</body>
